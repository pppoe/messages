 possible to do it in one step, there must be some other way to get a similar linearly coupled target distribution.`,"image":`https://media.mas.to/media_attachments/files/112/096/324/325/314/546/original/d66aeb81dc115e73.png`,"link":`https://arxiv.org/abs/2309.06380`,"tags":[`Diffusion`,`GenerativeModel`],"date":`2024-03-14`,"interact":`https://mas.to/@pppoe/112096324702915734`},{"text":`A nice way to model how one distribution transforms into another. The time-dependent vector field defines the flow and hence the probabilistic path across distributions. Interestingly diffusion model can be viewed as a special instance of this flow matching framework and one can alternatively define the path following optimal transportation theory as well.`,"image":``,"link":`https://arxiv.org/abs/2210.02747`,"tags":[`Diffusion`,`GenerativeModel`],"date":`2024-03-13`,"interact":`https://mas.to/@pppoe/112090401663872161`},{"text":`Really cool demo. It feels like the conversation part by itself is almost solved and the robot is now making it possible for the agent to actuate physical world. Very impressive manipulation and cannot help wondering how well it generalizes.`,"image":``,"link":`https://twitter.com/figure_robot/status/1767913661253984474`,"tags":[`Robotics`],"date":`2024-03-13`,"interact":`https://mas.to/@pppoe/112090104256760664`},{"text":`Making Wrong Code Look Wrong \\u2013 Joel on Software - Another good piece of wisdom from Joel. I unconsciously follow a similar naming convention sometimes in my daily work but could have never thought about the underlying benefits and intentions. I wish I had read this years ago. `,"image":``,"link":`https://www.joelonsoftware.com/2005/05/11/making-wrong-code-look-wrong/`,"tags":[`Programming `],"date":`2024-03-08`,"interact":`https://mas.to/@pppoe/112063711968032222`},{"text":`This is so true. If you think about today's LLM, it is another layer of abstraction in a broader sense and it can be leaky in its probabilistic nature. Should we use it to generate code to promise something like GPT agent, it can take considerable efforts to debug when it leaks and being aware of this would demand layers of expertises.`,"image":``,"link":`https://www.joelonsoftware.com/2002/11/11/the-law-of-leaky-abstractions/`,"tags":[`Programming`,`LLM`],"date":`2024-03-08`,"interact":`https://mas.to/@pppoe/112060563027829581`},{"text":`Evolving from Rule-based Classifier: Machine Learning Powered Auto Remediation in Netflix Data Platform | by Netflix Technology Blog | Mar, 2024 | Netflix TechBlog - It is common in practice to have a rule based solution deployed before any ML based solutions getting in. Nice way to add the ML solution on top of the existing one. `,"image":``,"link":`https://netflixtechblog.com/evolving-from-rule-based-classifier-machine-learning-powered-auto-remediation-in-netflix-data-039d5efd115b`,"tags":[],"date":`2024-03-05`,"interact":`https://mas.to/@pppoe/112043946651532542`},{"text":`[2402.18485v1] FinAgent: A Multimodal Foundation Agent for Financial Trading: Tool-Augmented, Diversified, and Generalist - Good to know there are datasets to benchmark trading methods in academia \\u2026 and this works uses GPT4V`,"image":``,"link":`https://arxiv.org/abs/2402.18485v1`,"tags":[],"date":`2024-02-29`,"interact":`https://mas.to/@pppoe/112018487644545101`},{"text":`RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for Robotic Manipulation - A fun Robot System combing Visual Language Model (GPT4V), vision models (SAM, Grounding-DINO), and sort of Knowledge Graph! The robot is quite busy from the video LOL. `,"image":`https://media.mas.to/media_attachments/files/112/001/502/067/751/181/original/fc2ba29c3bd20dd6.jpg`,"link":`https://arxiv.org/html/2402.15487v1`,"tags":[` Robotics`,`VisualLanguageModel`,`ComputerVision`],"date":`2024-02-26`,"interact":`https://mas.to/@pppoe/112001502435278469`}];const content=document.getElementById(`content`);let page=1;let pageCount=6;loadPosts();if(page>1){url=`/page`+ (page- 1)+ `.html`;if(url==`/page1.html`){url=`/`};document.getElementById(`next-btn`).href=url}else{document.getElementById(`next-btn`).style.display=`none`};if(page<pageCount){url=`/page`+ (page+ 1)+ `.html`;if(url==`/page1.html`){url=`/`};document.getElementById(`prev-btn`).href=url}else{document.getElementById(`prev-btn`).style.display=`none`};if(pageCount>1){document.getElementById(`page-index`).innerHTML=page}else{document.getElementById(`page-index`).style.display=`none`}</script>
