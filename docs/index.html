-25`,"interact":`https://mas.to/@pppoe/112159787078940263`},{"text":`Programmable Open Source Robot Dog & Cat, Robotics Kits | Petoi - Seems to be a good one for my kid! `,"image":`https://media.mas.to/media_attachments/files/112/145/991/018/771/644/original/b56be5b616f751e6.png`,"link":`https://www.petoi.com/`,"tags":[`Robotics`],"date":`2024-03-23`,"interact":`https://mas.to/@pppoe/112145991420207810`},{"text":`RT-2: Vision-Language-Action Models - The new paradigm of \\u201cworking system\\u201d is having very simple diagram but each block is actually a huge model. Essentially the data and SGD did all the programming we use to do. Interesting! `,"image":`https://media.mas.to/media_attachments/files/112/131/845/418/498/480/original/2320307ffc15528f.png`,"link":`https://robotics-transformer2.github.io/`,"tags":[` Robotics`],"date":`2024-03-20`,"interact":`https://mas.to/@pppoe/112131845805889292`},{"text":`Great post to follow along to learn diffusion model by implementing it from scratch. The distance function based perspective is new to me and makes a lot of sense with the visuals.`,"image":`https://media.mas.to/media_attachments/files/112/124/439/205/011/523/original/9e0e466913329686.png`,"link":`https://www.chenyang.co/diffusion.html`,"tags":[`Diffusion`,`GenerativeModel`,`FromScratch`],"date":`2024-03-19`,"interact":`https://mas.to/@pppoe/112124439576764766`},{"text":`What I learned from looking at 900 most popular open source AI tools - Very interesting analysis on the ecosystem of GenAI open source projects `,"image":`https://media.mas.to/media_attachments/files/112/104/313/996/126/991/original/64f56f870e548327.png`,"link":`https://huyenchip.com//2024/03/14/ai-oss.html`,"tags":[`GenerativeAI`,`OpenSource`],"date":`2024-03-16`,"interact":`https://mas.to/@pppoe/112104314376370971`},{"text":`PIXART-\\u03b1 - Nice project to study DiT based image generation model. Image quality looks good! `,"image":`https://media.mas.to/media_attachments/files/112/103/240/315/521/815/original/2a401210c0f8f911.png`,"link":`https://pixart-alpha.github.io/`,"tags":[`ImageGeneration`,`Diffusion`,`Transformer`],"date":`2024-03-15`,"interact":`https://mas.to/@pppoe/112103240702333666`},{"text":`Distillation on top of k-rectified Flow makes a one-step SD called InstaFlow. Nice work. The reasoning makes sense to me, although I didn't fully get why it works. The overall workflow looks like a sophisticated distillation pipeline to me. Now this paper shows that it is possible to do it in one step, there must be some other way to get a similar linearly coupled target distribution.`,"image":`https://media.mas.to/media_attachments/files/112/096/324/325/314/546/original/d66aeb81dc115e73.png`,"link":`https://arxiv.org/abs/2309.06380`,"tags":[`Diffusion`,`GenerativeModel`],"date":`2024-03-14`,"interact":`https://mas.to/@pppoe/112096324702915734`},{"text":`A nice way to model how one distribution transforms into another. The time-dependent vector field defines the flow and hence the probabilistic path across distributions. Interestingly diffusion model can be viewed as a special instance of this flow matching framework and one can alternatively define the path following optimal transportation theory as well.`,"image":``,"link":`https://arxiv.org/abs/2210.02747`,"tags":[`Diffusion`,`GenerativeModel`],"date":`2024-03-13`,"interact":`https://mas.to/@pppoe/112090401663872161`}];const content=document.getElementById(`content`);let page=1;let pageCount=7;loadPosts();if(page>1){url=`/page`+ (page- 1)+ `.html`;if(url==`/page1.html`){url=`/`};document.getElementById(`next-btn`).href=url}else{document.getElementById(`next-btn`).style.display=`none`};if(page<pageCount){url=`/page`+ (page+ 1)+ `.html`;if(url==`/page1.html`){url=`/`};document.getElementById(`prev-btn`).href=url}else{document.getElementById(`prev-btn`).style.display=`none`};if(pageCount>1){document.getElementById(`page-index`).innerHTML=page}else{document.getElementById(`page-index`).style.display=`none
